syntax = "proto3";

package common;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/fabrizio2210/cover_letter/src/go/internal/proto/common";

message HistoryPart {
    string text = 1; // @gotags: bson:"text"
}

message HistoryEntry {
    string role = 1; // @gotags: bson:"role"
    repeated HistoryPart parts = 2; // @gotags: bson:"parts"
}

message CoverLetter {
    string id = 1; // @gotags: bson:"_id"
    string recipient_id = 2; // @gotags: bson:"recipient_id"
    string conversation_id = 3; // @gotags: bson:"conversation_id"
    string cover_letter = 4; // @gotags: bson:"cover_letter"
    google.protobuf.Timestamp created_at = 5; // @gotags: bson:"created_at"
    google.protobuf.Timestamp updated_at = 6; // @gotags: bson:"updated_at"
    string prompt = 7; // @gotags: bson:"prompt"
    repeated HistoryEntry history = 8; // @gotags: bson:"history"
    // Recipient info populated by aggregation lookup
    Recipient recipient_info = 9; // @gotags: bson:"recipientInfo,omitempty"
}

message Field {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string field = 2; // @gotags: bson:"field"
}

message CompanyDiscoverySource {
    string source = 1; // @gotags: bson:"source"
    string role = 2; // @gotags: bson:"role"
    string source_url = 3; // @gotags: bson:"source_url,omitempty"
    string careers_url = 4; // @gotags: bson:"careers_url,omitempty"
    string domain = 5; // @gotags: bson:"domain,omitempty"
}

message DiscoveredCompany {
    string name = 1; // @gotags: bson:"name"
    string source = 2; // @gotags: bson:"source"
    string role = 3; // @gotags: bson:"role"
    string source_url = 4; // @gotags: bson:"source_url,omitempty"
    string careers_url = 5; // @gotags: bson:"careers_url,omitempty"
    string domain = 6; // @gotags: bson:"domain,omitempty"
    string description = 7; // @gotags: bson:"description,omitempty"
}

message CompanySlugSearchAttempt {
    google.protobuf.Timestamp attempted_at = 1; // @gotags: bson:"attempted_at,omitempty"
    int32 attempts = 2; // @gotags: bson:"attempts,omitempty"
    string outcome = 3; // @gotags: bson:"outcome,omitempty"
}

message Workflow2TerminalFailure {
    string failure_type = 1; // @gotags: bson:"failure_type,omitempty"
    google.protobuf.Timestamp failed_at = 2; // @gotags: bson:"failed_at,omitempty"
    string last_url = 3; // @gotags: bson:"last_url,omitempty"
    string message = 4; // @gotags: bson:"message,omitempty"
}

enum ScoringStatus {
    SCORING_STATUS_UNSPECIFIED = 0;
    SCORING_STATUS_UNSCORED = 1;
    SCORING_STATUS_QUEUED = 2;
    SCORING_STATUS_SCORED = 3;
    SCORING_STATUS_FAILED = 4;
    SCORING_STATUS_SKIPPED = 5;
}

message Company {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string name = 2; // @gotags: bson:"name"
    string field_id = 3; // @gotags: bson:"field_id"
    Field field_info = 4; // @gotags: bson:"fieldInfo,omitempty"
    string description = 5; // @gotags: bson:"description,omitempty"
    string canonical_name = 6; // @gotags: bson:"canonical_name,omitempty"
    repeated CompanyDiscoverySource discovery_sources = 7; // @gotags: bson:"discovery_sources,omitempty"
    string ats_provider = 8; // @gotags: bson:"ats_provider,omitempty"
    string ats_slug = 9; // @gotags: bson:"ats_slug,omitempty"
    map<string, CompanySlugSearchAttempt> ats_slug_search_attempts = 10; // @gotags: bson:"ats_slug_search_attempts,omitempty"
    Workflow2TerminalFailure workflow2_terminal_failure = 11; // @gotags: bson:"workflow2_terminal_failure,omitempty"
}

message Recipient {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string email = 2; // @gotags: bson:"email"
    string name = 3; // @gotags: bson:"name"
    string description = 4; // @gotags: bson:"description"
    string company_id = 5; // @gotags: bson:"company_id"
    Company company_info = 6; // @gotags: bson:"companyInfo,omitempty"
}

message Identity {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string identity = 2; // @gotags: bson:"identity"
    string name = 3; // @gotags: bson:"name"
    string description = 4; // @gotags: bson:"description"
    string field_id = 5; // @gotags: bson:"field_id"
    repeated string roles = 6; // @gotags: bson:"roles,omitempty"
    string html_signature = 7; // @gotags: bson:"html_signature,omitempty"
    Field field_info = 8; // @gotags: bson:"fieldInfo,omitempty"
    repeated IdentityPreference preferences = 9; // @gotags: bson:"preferences,omitempty"
}

message IdentityPreference {
    string key = 1; // @gotags: bson:"key"
    string guidance = 2; // @gotags: bson:"guidance,omitempty"
    double weight = 3; // @gotags: bson:"weight"
    bool enabled = 4; // @gotags: bson:"enabled"
}

message JobPreferenceScore {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string job_id = 2; // @gotags: bson:"job_id"
    string identity_id = 3; // @gotags: bson:"identity_id"
    string preference_key = 4; // @gotags: bson:"preference_key"
    string preference_guidance = 5; // @gotags: bson:"preference_guidance,omitempty"
    double preference_weight = 6; // @gotags: bson:"preference_weight,omitempty"
    int32 score = 7; // @gotags: bson:"score"
    string rationale = 8; // @gotags: bson:"rationale,omitempty"
    google.protobuf.Timestamp scored_at = 9; // @gotags: bson:"scored_at,omitempty"
}

message Job {
    string id = 1; // @gotags: bson:"_id,omitempty"
    string company_id = 2; // @gotags: bson:"company_id"
    Company company_info = 3; // @gotags: bson:"companyInfo,omitempty"
    string title = 4; // @gotags: bson:"title"
    string description = 5; // @gotags: bson:"description"
    string location = 6; // @gotags: bson:"location"
    string platform = 7; // @gotags: bson:"platform"
    string external_job_id = 8; // @gotags: bson:"external_job_id"
    string source_url = 9; // @gotags: bson:"source_url"
    google.protobuf.Timestamp created_at = 10; // @gotags: bson:"created_at"
    google.protobuf.Timestamp updated_at = 11; // @gotags: bson:"updated_at"
    ScoringStatus scoring_status = 12; // @gotags: bson:"scoring_status"
    double weighted_score = 13; // @gotags: bson:"weighted_score"
    int32 max_score = 14; // @gotags: bson:"max_score,omitempty"
    repeated JobPreferenceScore scores = 15; // @gotags: bson:"scores,omitempty"
}

message CrawlTriggerRequest {
    string identity_id = 1;
}

message CrawlTriggerQueuePayload {
    string run_id = 1;
    string identity_id = 2;
    google.protobuf.Timestamp requested_at = 3;
}

message WorkflowDispatchMessage {
    string run_id = 1;
    string workflow_run_id = 2;
    string workflow_id = 3;
    string identity_id = 4;
    string company_id = 5;
    string ats_provider = 6;
    string ats_slug = 7;
    string trigger_kind = 8;
    int32 attempt = 9;
    google.protobuf.Timestamp dispatched_at = 10;
}

message CompanyDiscoveryEvent {
    string run_id = 1;
    string workflow_run_id = 2;
    string workflow_id = 3;
    string identity_id = 4;
    string company_id = 5;
    string reason = 6;
    google.protobuf.Timestamp emitted_at = 7;
}

message AtsJobTriggerEvent {
    string run_id = 1;
    string workflow_run_id = 2;
    string workflow_id = 3;
    string identity_id = 4;
    string company_id = 5;
    string ats_provider = 6;
    string ats_slug = 7;
    google.protobuf.Timestamp emitted_at = 8;
}

message CrawlProgress {
    string run_id = 1;
    string identity_id = 2;
    string status = 3;
    string workflow = 4;
    string message = 5;
    int32 estimated_total = 6;
    int32 completed = 7;
    int32 percent = 8;
    google.protobuf.Timestamp started_at = 9;
    google.protobuf.Timestamp updated_at = 10;
    google.protobuf.Timestamp finished_at = 11;
    string reason = 12;
    string workflow_run_id = 13;
    string workflow_id = 14;
}

message ScoringProgress {
    string run_id = 1;
    string identity_id = 2;
    string status = 3;
    string message = 4;
    int32 estimated_total = 5;
    int32 completed = 6;
    int32 percent = 7;
    google.protobuf.Timestamp started_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    google.protobuf.Timestamp finished_at = 10;
    string reason = 11;
}
