services:
  mongo:
    image: mongo:4.4.18
    ports:
      - "27017"

  redis:
    image: redis:7.4-bookworm
    ports:
      - "6379"

  ai_querier:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../..:/workspace:delegated
    command: bash -c "pip install -r /workspace/src/python/ai_querier/requirements.txt >/dev/null 2>&1 || true && python -u /workspace/src/python/ai_querier/ai_querier.py"
    environment:
      - AI_QUERIER_TEST_MODE=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb://mongo:27017/
      - DB_NAME=cover_letter
      - REDIS_QUEUE_GENERATE_COVER_LETTER_NAME=cover_letter_generation_queue
    depends_on:
      - mongo
      - redis

  ai_scorer:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../..:/workspace:delegated
    command: bash -c "pip install -r /workspace/src/python/ai_scorer/requirements.txt >/dev/null 2>&1 || true && python -u /workspace/src/python/ai_scorer/ai_scorer.py"
    environment:
      - AI_SCORER_TEST_MODE=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb://mongo:27017/
      - DB_NAME=cover_letter
      - JOB_SCORING_QUEUE_NAME=job_scoring_queue
      - OLLAMA_MODEL=test-mode-model
    depends_on:
      - mongo
      - redis

  api:
    image: golang:1.25
    working_dir: /workspace/src/go/cmd/api
    volumes:
      - ../..:/workspace:delegated
    command: bash -lc "cd /workspace/src/go/cmd/api && /usr/local/go/bin/go mod download >/dev/null 2>&1 || true && /usr/local/go/bin/go run ."
    environment:
      - ADMIN_PASSWORD=testpassword
      - AUTH_USERS_JSON={"e2e-test-user":"testpassword","e2e-crawl-user":"testpassword"}
      - JWT_SECRET=testsecret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb://mongo:27017/
      - DB_NAME=cover_letter
      - REDIS_QUEUE_GENERATE_COVER_LETTER_NAME=cover_letter_generation_queue
    depends_on:
      - mongo
      - redis
    ports:
      - "8080"

  dispatcher:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../..:/workspace:delegated
    command: >
      bash -lc "pip install -r /workspace/src/python/web_crawler/requirements.txt >/dev/null 2>&1 &&
        PYTHONPATH=/workspace python -u -m src.python.web_crawler.dispatcher.main --worker"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb://mongo:27017/
      - DB_NAME=cover_letter
      - CRAWLER_TRIGGER_QUEUE_NAME=crawler_trigger_queue
      - CRAWLER_YCOMBINATOR_QUEUE_NAME=crawler_ycombinator_queue
      - CRAWLER_HACKERNEWS_QUEUE_NAME=crawler_hackernews_queue
      - CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME=crawler_ats_job_extraction_queue
      - CRAWLER_4DAYWEEK_QUEUE_NAME=crawler_4dayweek_queue
      - CRAWLER_LEVELSFYI_QUEUE_NAME=crawler_levelsfyi_queue
      - CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME=enrichment_ats_enrichment_queue
      - CRAWLER_PROGRESS_CHANNEL_NAME=crawler_progress_channel
      - JOB_SCORING_QUEUE_NAME=job_scoring_queue
    depends_on:
      - mongo
      - redis
