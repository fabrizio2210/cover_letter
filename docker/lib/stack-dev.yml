  redis_cover_letter:
    image: redis
    networks:
      - backends

  telegram-bot:
    image: fabrizio2210/coverletter-telegram-bot-dev
    restart: always
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      MONGO_HOST: "mongodb://root:develop@mongo:27017/"
      DB_NAME: "cover_letter"
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
      REDIS_HOST: redis_cover_letter
    volumes:
      - ../../:/app
    networks:
      - backends

  ai-querier:
    image: fabrizio2210/coverletter-ai-querier-dev
    restart: always
    environment:
      GEMINI_TOKEN: ${GEMINI_TOKEN}
      MONGO_HOST: "mongodb://root:develop@mongo:27017/"
      DB_NAME: "cover_letter"
      REDIS_HOST: redis_cover_letter
    volumes:
      - ../../:/app
    networks:
      - backends

  ai-scorer:
    image: fabrizio2210/coverletter-ai-scorer-dev
    build:
      context: ../..
      dockerfile: docker/x86_64/Dockerfile-ai-scorer-dev
    restart: always
    environment:
      MONGO_HOST: "mongodb://root:develop@mongo:27017/"
      DB_NAME: "cover_letter"
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: qwen2.5:1.5b
      AI_SCORER_TEST_MODE: 0
      AI_SCORER_OLLAMA_PARALLELISM: 2
    volumes:
      - ../../:/app
    networks:
      - backends

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "OLLAMA_HOST=0.0.0.0:11434 ollama serve & sleep 10 && ollama pull qwen2.5:1.5b && wait"]
    restart: always
    deploy:
      replicas: 2
    volumes:
      # This is just for speed up the dev environment, in prod we don't want to persist the model data on disk.
      - ollama_data:/root/.ollama
    networks:
      - backends

  web-crawler:
    image: fabrizio2210/coverletter-web-crawler-dev
    build:
      context: ../..
      dockerfile: docker/x86_64/Dockerfile-web-crawler-dev
    restart: always
    environment:
      MONGO_HOST: "mongodb://root:develop@mongo:27017/"
      DB_NAME: "cover_letter"
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_TRIGGER_QUEUE_NAME: "crawler_trigger_queue"
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_COMPANY_DISCOVERY_QUEUE_NAME: "crawler_company_discovery_queue"
      CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME: "crawler_ats_job_extraction_queue"
      CRAWLER_LEVELSFYI_QUEUE_NAME: "crawler_levelsfyi_queue"
      CRAWLER_4DAYWEEK_QUEUE_NAME: "crawler_4dayweek_queue"
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      CRAWLER_ENABLE_SCORING_ENQUEUE: "1"
      SERPER_API_KEY: ${SERPER_API_KEY}
    volumes:
      - ../../:/app
    networks:
      - backends

  crawler-company-discovery:
