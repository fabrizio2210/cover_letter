      REDIS_PORT: 6379
      CRAWLER_ENRICHMENT_RETIRING_JOBS_QUEUE_NAME: "enrichment_retiring_jobs_queue"
      JOB_UPDATE_CHANNEL_NAME: "job_update_channel"
    volumes:
      - ../../:/app
    networks:
      - backends

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: develop
    volumes:
      - mongo_data:/data/db
    networks:
      - backends

  mongo-express:
    image: mongo-express
    restart: always
    labels: 
      traefik.port: 80
      traefik.enable: "true"
      traefik.mongoexpress.rule: "Host(`mongo-express`)  && PathPrefix(`/`)"
      traefik.http.services.mongoexpress-service.loadbalancer.server.port: 8081
      traefik.http.routers.mongoexpress.rule: "Host(`mongo-express`) && PathPrefix(`/`)"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: develop
      ME_CONFIG_MONGODB_URL: mongodb://root:develop@mongo:27017/
    networks:
      - backends

  coverletter-api-dev:
    image: fabrizio2210/coverletter-api-dev
    build:
      context: ../..
      dockerfile: docker/x86_64/Dockerfile-api-dev
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MONGO_HOST=mongodb://root:develop@mongo:27017/
      - DB_NAME=cover_letter
      - REDIS_HOST=redis_cover_letter
      - CRAWLER_ENRICHMENT_RETIRING_JOBS_QUEUE_NAME=enrichment_retiring_jobs_queue
      - JOB_UPDATE_CHANNEL_NAME=job_update_channel
    volumes:
      - ../../src/go/:/app
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: "PathPrefix(`/api`)"
      traefik.http.services.api-service.loadbalancer.server.port: 8080
    restart: unless-stopped
    networks:
      - backends

  coverletter-frontend-dev:
    image: fabrizio2210/coverletter-frontend-dev
    build:
      context: ../..
      dockerfile: docker/x86_64/Dockerfile-frontend-dev
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "PathPrefix(`/`)"
      traefik.http.services.frontend-service.loadbalancer.server.port: 4200
    volumes:
      - ../../src/js/coverletter-frontend/src:/app/src
    restart: unless-stopped
    networks:
      - backends

