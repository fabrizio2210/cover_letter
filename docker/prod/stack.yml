version: '3.4'

services:
  redis_cover_letter:
    image: redis
    networks:
      - traefik_backends

  telegram-bot:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-telegram-bot:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export BOT_TOKEN="$$(cat /run/secrets/COVERLETTER_BOT_TOKEN)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python src/python/telegram_bot/telegram_bot.py
    restart: always
    environment:
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
      REDIS_HOST: redis_cover_letter
    secrets:
      - COVERLETTER_BOT_TOKEN
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  ai-querier:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-ai:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export GEMINI_TOKEN="$$(cat /run/secrets/COVERLETTER_GEMINI_TOKEN)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python src/python/ai_querier/ai_querier.py
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
    secrets:
      - COVERLETTER_GEMINI_TOKEN
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  ai-scorer:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-ai-scorer:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python src/python/ai_scorer/ai_scorer.py
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: qwen2.5:1.5b
      AI_SCORER_TEST_MODE: 0
      AI_SCORER_OLLAMA_PARALLELISM: 2
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "OLLAMA_HOST=0.0.0.0:11434 ollama serve & sleep 10 && ollama pull qwen2.5:1.5b && wait"]
    restart: always
    deploy:
      replicas: 2
    networks:
      - traefik_backends

  web-crawler:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-web-crawler:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export SERPER_API_KEY="$$(cat /run/secrets/COVERLETTER_SERPER_API_KEY)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.dispatcher.main --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_TRIGGER_QUEUE_NAME: "crawler_trigger_queue"
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_YCOMBINATOR_QUEUE_NAME: "crawler_ycombinator_queue"
      CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME: "crawler_ats_job_extraction_queue"
      CRAWLER_LEVELSFYI_QUEUE_NAME: "crawler_levelsfyi_queue"
      CRAWLER_4DAYWEEK_QUEUE_NAME: "crawler_4dayweek_queue"
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      CRAWLER_ENABLE_SCORING_ENQUEUE: "1"
    secrets:
      - COVERLETTER_SERPER_API_KEY
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  crawler-ycombinator:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-crawler-ycombinator:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export SERPER_API_KEY="$$(cat /run/secrets/COVERLETTER_SERPER_API_KEY)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.crawler_ycombinator.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_YCOMBINATOR_QUEUE_NAME: "crawler_ycombinator_queue"
      CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME: "enrichment_ats_enrichment_queue"
    secrets:
      - COVERLETTER_SERPER_API_KEY
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  crawler-hackernews:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-crawler-hackernews:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.crawler_hackernews.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_HACKERNEWS_QUEUE_NAME: "crawler_hackernews_queue"
      CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME: "enrichment_ats_enrichment_queue"
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  crawler-ats-job-extraction:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-crawler-ats-job-extraction:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export SERPER_API_KEY="$$(cat /run/secrets/COVERLETTER_SERPER_API_KEY)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.crawler_ats_job_extraction.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME: "crawler_ats_job_extraction_queue"
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      CRAWLER_ENABLE_SCORING_ENQUEUE: "1"
    secrets:
      - COVERLETTER_SERPER_API_KEY
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  crawler-levelsfyi:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-crawler-levelsfyi:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.crawler_levelsfyi.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_LEVELSFYI_QUEUE_NAME: "crawler_levelsfyi_queue"
      CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME: "enrichment_ats_enrichment_queue"
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      CRAWLER_ENABLE_SCORING_ENQUEUE: "1"
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  crawler-4dayweek:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-crawler-4dayweek:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.crawler_4dayweek.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_4DAYWEEK_QUEUE_NAME: "crawler_4dayweek_queue"
      CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME: "enrichment_ats_enrichment_queue"
      JOB_SCORING_QUEUE_NAME: "job_scoring_queue"
      CRAWLER_ENABLE_SCORING_ENQUEUE: "1"
      CRAWLER_REFERER: "https://4dayweek.io/jobs"
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  enrichment-ats-enrichment:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-enrichment-ats-enrichment:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export SERPER_API_KEY="$$(cat /run/secrets/COVERLETTER_SERPER_API_KEY)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.enrichment_ats_enrichment.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_PROGRESS_CHANNEL_NAME: "crawler_progress_channel"
      CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME: "enrichment_ats_enrichment_queue"
      CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME: "crawler_ats_job_extraction_queue"
    secrets:
      - COVERLETTER_SERPER_API_KEY
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends
    deploy:
      replicas: 4

  enrichment-retiring-jobs:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-enrichment-retiring-jobs:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec python -m src.python.web_crawler.enrichment_retiring_jobs.worker --worker
    restart: always
    environment:
      REDIS_HOST: redis_cover_letter
      REDIS_PORT: 6379
      CRAWLER_ENRICHMENT_RETIRING_JOBS_QUEUE_NAME: "enrichment_retiring_jobs_queue"
      JOB_UPDATE_CHANNEL_NAME: "job_update_channel"
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  mongo:
    image: mongo:4.4.18
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/COVERLETTER_MONGO_PASSWORD
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    volumes:
      - mongo_data:/data/db
    networks:
      - traefik_backends

  mongo-express:
    image: mongo-express
    command:
      - /bin/sh
      - -c
      - export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export ME_CONFIG_MONGODB_ADMINPASSWORD="$$MONGO_PASSWORD" && export ME_CONFIG_MONGODB_URL="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec node app
    restart: always
    labels: 
      traefik.port: 80
      traefik.enable: "true"
      traefik.mongoexpress.rule: "Host(`mongo-express`)  && PathPrefix(`/`)"
      traefik.http.services.mongoexpress-service.loadbalancer.server.port: 8081
      traefik.http.routers.mongoexpress.rule: "Host(`mongo-express`) && PathPrefix(`/`)"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
    secrets:
      - COVERLETTER_MONGO_PASSWORD
    networks:
      - traefik_backends

  coverletter-api:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-api:${DEPLOY_TAG:-x86_64}
    command:
      - /bin/sh
      - -c
      - export ADMIN_PASSWORD="$$(cat /run/secrets/COVERLETTER_ADMIN_PASSWORD)" && export AUTH_USERS_JSON="$$(cat /run/secrets/COVERLETTER_AUTH_USERS_JSON)" && export ADMIN_JWT_SECRET="$$(cat /run/secrets/COVERLETTER_ADMIN_JWT_SECRET)" && export JWT_SECRET="$$(cat /run/secrets/COVERLETTER_JWT_SECRET)" && export MONGO_PASSWORD="$$(cat /run/secrets/COVERLETTER_MONGO_PASSWORD)" && export MONGO_HOST="mongodb://root:$$MONGO_PASSWORD@mongo:27017/" && exec ./api
    environment:
      - REDIS_HOST=redis_cover_letter
      - CRAWLER_TRIGGER_QUEUE_NAME=crawler_trigger_queue
      - CRAWLER_YCOMBINATOR_QUEUE_NAME=crawler_ycombinator_queue
      - CRAWLER_HACKERNEWS_QUEUE_NAME=crawler_hackernews_queue
      - CRAWLER_ATS_JOB_EXTRACTION_QUEUE_NAME=crawler_ats_job_extraction_queue
      - CRAWLER_LEVELSFYI_QUEUE_NAME=crawler_levelsfyi_queue
      - CRAWLER_4DAYWEEK_QUEUE_NAME=crawler_4dayweek_queue
      - CRAWLER_ENRICHMENT_ATS_ENRICHMENT_QUEUE_NAME=enrichment_ats_enrichment_queue
      - JOB_SCORING_QUEUE_NAME=job_scoring_queue
      - CRAWLER_ENRICHMENT_RETIRING_JOBS_QUEUE_NAME=enrichment_retiring_jobs_queue
      - JOB_UPDATE_CHANNEL_NAME=job_update_channel
    secrets:
      - COVERLETTER_ADMIN_PASSWORD
      - COVERLETTER_AUTH_USERS_JSON
      - COVERLETTER_ADMIN_JWT_SECRET
      - COVERLETTER_JWT_SECRET
      - COVERLETTER_MONGO_PASSWORD
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: "Host(`coverletter.no-ip.dynu.net`) && PathPrefix(`/api`)"
      traefik.http.services.api-service.loadbalancer.server.port: 8080
    restart: unless-stopped
    networks:
      - traefik_backends

  coverletter-frontend:
    image: ${DOCKER_ORG:-fabrizio2210}/coverletter-frontend:${DEPLOY_TAG:-x86_64}
    labels:
      traefik.enable: "true"
      traefik.http.routers.frontend.rule: "Host(`coverletter.no-ip.dynu.net`) && PathPrefix(`/`)"
      traefik.http.services.frontend-service.loadbalancer.server.port: 80
    restart: unless-stopped
    networks:
      - traefik_backends

volumes:
  mongo_data:
    driver_opts:
      type: "nfs"
      o: "addr=192.168.100.1,nolock,soft,rw"
      device: ":/mnt/HDD/docker/coverletter/mongo_data"

secrets:
  COVERLETTER_BOT_TOKEN:
    external: true
  COVERLETTER_GEMINI_TOKEN:
    external: true
  COVERLETTER_ADMIN_PASSWORD:
    external: true
  COVERLETTER_AUTH_USERS_JSON:
    external: true
  COVERLETTER_ADMIN_JWT_SECRET:
    external: true
  COVERLETTER_JWT_SECRET:
    external: true
  COVERLETTER_SERPER_API_KEY:
    external: true
  COVERLETTER_MONGO_PASSWORD:
    external: true

networks:
  traefik_backends:
    external: true
